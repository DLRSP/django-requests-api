---
name: Update Used in consumers

# Sync README + docs/community/references.md from DLRSP/workflows (code search).
# Does not run on every CI push — only on schedule or manual dispatch.

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    uses: DLRSP/workflows/.github/workflows/update-used-in.yaml@main
    secrets: inherit
